<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PROVADOR 3D — Guarda-Roupa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Big+Shoulders+Stencil+Text:wght@700;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0d0d0d;
    --panel: #141414;
    --line: #2a2a2a;
    --paper: #eae5da;
    --ecru: #d8cdb8;
    --accent: #ff4d1c;
    --text: #eae5da;
    --dim: #8a8578;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;background:var(--bg);color:var(--text);font-family:'IBM Plex Mono',monospace;overflow:hidden;}

  #app{display:flex;height:100vh;width:100vw;}

  /* ---------- viewer ---------- */
  #viewer{flex:1;position:relative;background:
    radial-gradient(circle at 50% 30%, #1c1c1c 0%, #0d0d0d 70%);}
  #viewer canvas{display:block;width:100%;height:100%;}

  #brandmark{
    position:absolute;top:28px;left:32px;
    font-family:'Anton',sans-serif;
    font-size:22px;letter-spacing:2px;
    color:var(--text);
    z-index:5;
    pointer-events:none;
  }
  #brandmark span{color:var(--accent);}

  #hint{
    position:absolute;bottom:24px;left:32px;
    font-size:11px;color:var(--dim);
    letter-spacing:1px;text-transform:uppercase;
    z-index:5;
  }

  #loading{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    flex-direction:column;gap:14px;background:var(--bg);z-index:20;
    transition:opacity .5s ease;
  }
  #loading .bar{width:220px;height:2px;background:#242424;position:relative;overflow:hidden;}
  #loading .bar i{position:absolute;left:-40%;top:0;bottom:0;width:40%;background:var(--accent);animation:load 1.1s ease-in-out infinite;}
  @keyframes load{0%{left:-40%;}50%{left:60%;}100%{left:100%;}}
  #loading p{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);}

  /* ---------- sidebar ---------- */
  #sidebar{
    width:360px;min-width:360px;
    background:var(--panel);
    border-left:1px solid var(--line);
    display:flex;flex-direction:column;
    height:100vh;
  }
  #sidebar-head{
    padding:28px 26px 18px;
    border-bottom:1px solid var(--line);
  }
  #sidebar-head .eyebrow{font-size:10px;letter-spacing:3px;color:var(--accent);text-transform:uppercase;margin-bottom:8px;}
  #sidebar-head h1{
    font-family:'Big Shoulders Stencil Text',sans-serif;
    font-weight:900;
    font-size:32px;line-height:0.95;letter-spacing:1px;margin:0;
    color:var(--text);
  }
  #sidebar-head p{font-size:11.5px;color:var(--dim);line-height:1.5;margin:12px 0 0;}

  #wardrobe{flex:1;overflow-y:auto;padding:14px 14px 0;}
  #wardrobe::-webkit-scrollbar{width:6px;}
  #wardrobe::-webkit-scrollbar-thumb{background:#2c2c2c;}

  .piece{
    border:1px solid var(--line);
    margin-bottom:12px;
    cursor:pointer;
    background:#101010;
    transition:border-color .2s ease, transform .15s ease;
    overflow:hidden;
  }
  .piece:hover{border-color:#454037;}
  .piece.active{border-color:var(--accent);}

  .piece-top{display:flex;gap:0;}
  .piece-swatch{
    width:78px;height:78px;flex-shrink:0;
    position:relative;
    border-right:1px solid var(--line);
    background:#1a1a1a;
  }
  .piece-swatch canvas{width:100%;height:100%;display:block;}

  .piece-info{flex:1;padding:12px 14px;display:flex;flex-direction:column;justify-content:center;gap:4px;}
  .piece-name{font-family:'Anton',sans-serif;font-size:15px;letter-spacing:1px;color:var(--text);}
  .piece-tag{font-size:10px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;}
  .piece-price{font-size:13px;color:var(--accent);font-weight:600;margin-top:2px;}

  .colorways{display:flex;gap:7px;padding:0 14px 12px;}
  .cw{
    width:18px;height:18px;border-radius:50%;
    border:1px solid rgba(255,255,255,0.15);
    cursor:pointer;position:relative;
  }
  .cw.selected::after{
    content:'';position:absolute;inset:-4px;border:1px solid var(--accent);border-radius:50%;
  }

  #cta{
    padding:18px 26px 26px;
    border-top:1px solid var(--line);
  }
  #cta .selected-line{font-size:11px;color:var(--dim);margin-bottom:10px;letter-spacing:.5px;}
  #cta .selected-line b{color:var(--text);}
  #wa-btn{
    display:flex;align-items:center;justify-content:center;gap:8px;
    width:100%;padding:14px;background:var(--accent);color:#0d0d0d;
    font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:12.5px;
    letter-spacing:1px;text-transform:uppercase;text-decoration:none;
    border:none;cursor:pointer;
  }
  #wa-btn:hover{background:#ff6a3d;}

  @media (max-width: 820px){
    #app{flex-direction:column;}
    #sidebar{width:100%;min-width:0;height:46vh;order:2;border-left:none;border-top:1px solid var(--line);}
    #viewer{height:54vh;order:1;}
  }
</style>
</head>
<body>

<div id="app">
  <div id="viewer">
    <div id="brandmark">CRU<span>.</span>WARDROBE</div>
    <div id="hint">arraste para girar · scroll para zoom</div>
    <div id="loading">
      <div class="bar"><i></i></div>
      <p>carregando manequim 3d</p>
    </div>
  </div>

  <div id="sidebar">
    <div id="sidebar-head">
      <div class="eyebrow">Provador virtual</div>
      <h1>GUARDA-<br>ROUPA</h1>
      <p>Peças criadas do zero e projetadas direto no corpo 3D. Clique numa peça pra vestir o manequim, escolha a cor.</p>
    </div>

    <div id="wardrobe"></div>

    <div id="cta">
      <div class="selected-line">Vendo agora: <b id="sel-name">—</b></div>
      <a id="wa-btn" href="#" target="_blank" rel="noopener">Falar no WhatsApp →</a>
    </div>
  </div>
</div>

    name: 'CRU',
    tag: 'Oversized · algodão cru',
    price: 149,
    colorways: [
      { name: 'Cru',   bg: '#d8cdb8', ink: '#161311' },
      { name: 'Preto', bg: '#161311', ink: '#d8cdb8' },
      { name: 'Areia',  bg: '#bfae8f', ink: '#161311' },
    ],
    draw(ctx, size, bg, ink){
      ctx.fillStyle = bg; ctx.fillRect(0,0,size,size);
      // textura de trama de tecido cru
      ctx.globalAlpha = 0.05;
      for(let y=0;y<size;y+=3){ ctx.fillStyle = ink; ctx.fillRect(0,y,size,1); }
      ctx.globalAlpha = 1;
      ctx.fillStyle = ink;
      ctx.textAlign = 'center';
      ctx.font = '900 190px "Big Shoulders Stencil Text"';
      ctx.fillText('CRU', size/2, size*0.52);
      ctx.font = '600 26px "IBM Plex Mono"';
      ctx.fillText('ALGODA\u0303O · SEM TINGIMENTO', size/2, size*0.62);
      // linha fina
      ctx.fillRect(size*0.30, size*0.66, size*0.40, 2);
      ctx.font = '400 18px "IBM Plex Mono"';
      ctx.fillText('N\u00BA 001 — LOTE CRU', size/2, size*0.72);
    }
  },
  {
    id: 'concreto',
    name: 'CONCRETO',
    tag: 'Oversized · grafite urbano',
    price: 179,
    colorways: [
      { name: 'Preto', bg: '#111111', ink: '#f2efe6', accent:'#ff4d1c' },
      { name: 'Branco', bg: '#f2efe6', ink: '#111111', accent:'#ff4d1c' },
    ],
    draw(ctx, size, bg, ink, accent){
      ctx.fillStyle = bg; ctx.fillRect(0,0,size,size);
      // respingos tipo spray (formas geradas, nao referencia nenhuma marca)
      const rand = mulberry32(42);
      for(let i=0;i<26;i++){
        const x = rand()*size, y = rand()*size*0.4 + size*0.1;
        const r = rand()*10+2;
        ctx.globalAlpha = 0.25 + rand()*0.3;
        ctx.fillStyle = i%5===0 ? accent : ink;
        ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
      }
      ctx.globalAlpha = 1;
      ctx.fillStyle = ink;
      ctx.save();
      ctx.translate(size/2, size*0.5);
      ctx.rotate(-0.04);
      ctx.textAlign='center';
      ctx.font = '900 150px "Big Shoulders Stencil Text"';
      ctx.fillText('CONCRETO', 0, 0);
      ctx.restore();
      ctx.font = '600 24px "IBM Plex Mono"';
      ctx.fillText('ASFALTO · BETA\u0303O · CIDADE', size/2, size*0.62);
      ctx.fillStyle = accent;
      ctx.fillRect(size*0.36, size*0.665, size*0.28, 4);
    }
  },
  {
    id: 'sistema',
    name: 'SISTEMA',
    tag: 'Regular · grid tipogr\u00e1fico',
    price: 159,
    colorways: [
      { name: 'Branco', bg: '#eeeae0', ink: '#111111' },
      { name: 'Grafite', bg: '#2b2b2b', ink: '#eeeae0' },
    ],
    draw(ctx, size, bg, ink){
      ctx.fillStyle = bg; ctx.fillRect(0,0,size,size);
      ctx.strokeStyle = ink; ctx.globalAlpha = 0.15; ctx.lineWidth = 1;
      for(let i=0;i<=8;i++){
        const p = size*0.15 + i*(size*0.7/8);
        ctx.beginPath(); ctx.moveTo(p,size*0.15); ctx.lineTo(p,size*0.85); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(size*0.15,p); ctx.lineTo(size*0.85,p); ctx.stroke();
      }
      ctx.globalAlpha = 1;
      ctx.fillStyle = ink;
      ctx.textAlign='center';
      ctx.font = '900 120px "Big Shoulders Stencil Text"';
      ctx.fillText('SISTEMA', size/2, size*0.48);
      ctx.font = '500 22px "IBM Plex Mono"';
      ctx.fillText('LAT 23.55 S · LON 46.63 W', size/2, size*0.58);
      // barras tipo codigo de barras
      const rand = mulberry32(7);
      let x = size*0.30;
      const barY = size*0.63, barH = size*0.05;
      while(x < size*0.70){
        const w = 1 + rand()*4;
        if(rand() > 0.5){ ctx.fillRect(x, barY, w, barH); }
        x += w + 2;
      }
    }
  }
];

function mulberry32(a){
  return function(){
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  }
}

function makeTexture(design, colorway){
  const size = 1024;
  const canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  design.draw(ctx, size, colorway.bg, colorway.ink, colorway.accent || '#ff4d1c');
  const tex = new THREE.CanvasTexture(canvas);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.needsUpdate = true;
  return { tex, canvas };
}

/* ============================================================
   THREE.JS SCENE
   ============================================================ */
const viewerEl = document.getElementById('viewer');
const scene = new THREE.Scene();
scene.background = null;

const camera = new THREE.PerspectiveCamera(35, 1, 0.01, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
viewerEl.appendChild(renderer.domElement);

function resize(){
  const w = viewerEl.clientWidth, h = viewerEl.clientHeight;
  camera.aspect = w/h; camera.updateProjectionMatrix();
  renderer.setSize(w,h);
}
window.addEventListener('resize', resize);

// luz
scene.add(new THREE.HemisphereLight(0xfff2e0, 0x0a0a0a, 1.1));
const key = new THREE.DirectionalLight(0xffffff, 2.4);
key.position.set(2.5, 4, 3);
scene.add(key);
const rim = new THREE.DirectionalLight(0xff4d1c, 0.5);
rim.position.set(-3, 1, -2);
scene.add(rim);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 0.5;
controls.maxDistance = 20;
controls.target.set(0,0,0);

let currentDesignIndex = 0;
let currentColorwayIndex = 0;

function base64ToArrayBuffer(base64){
  const binaryChunks = [];
  const chunkSize = 1024 * 1024; // 1MB de base64 por vez, pra nao travar o navegador
  for(let i=0; i<base64.length; i+=chunkSize){
    binaryChunks.push(atob(base64.slice(i, i+chunkSize)));
  }
  const binary = binaryChunks.join('');
  const bytes = new Uint8Array(binary.length);
  for(let i=0; i<binary.length; i++){ bytes[i] = binary.charCodeAt(i); }
  return bytes.buffer;
}

// O preview deste chat bloqueia fetch() em URLs blob: (erro "blob-request://").
// Desativando createImageBitmap, o GLTFLoader passa a carregar texturas via
// <img src="blob:..."> em vez de fetch(), o que funciona em qualquer navegador
// e também dentro de sandboxes restritos como este preview.
if (typeof window !== 'undefined') { window.createImageBitmap = undefined; }

const loader = new GLTFLoader();
const dracoLoader = new DRACOLoader();
dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
loader.setDRACOLoader(dracoLoader);
const modelDataEl = document.getElementById('model-b64');
const modelArrayBuffer = base64ToArrayBuffer(modelDataEl.textContent);
modelDataEl.remove(); // libera memoria do texto base64 depois de decodificado

loader.parse(modelArrayBuffer, '', (gltf) => {
  const model = gltf.scene;
  scene.add(model);

  // Substitui a textura original do manequim por uma cor solida (tipo escultura /
  // argila) — assim o modelo nao depende de NENHUMA imagem/textura pra carregar,
  // eliminando de vez o erro de blob/textura.
  const claySculptMaterial = new THREE.MeshStandardMaterial({
    color: 0xcbc2b0,
    roughness: 0.92,
    metalness: 0.02,
  });
  model.traverse((o) => {
    if (o.isMesh) {
      o.material = claySculptMaterial;
      bodyMeshes.push(o);
    }
  });

  // centraliza e normaliza escala
  const box = new THREE.Box3().setFromObject(model);
  const size = new THREE.Vector3(); box.getSize(size);
  const center = new THREE.Vector3(); box.getCenter(center);
  const maxDim = Math.max(size.x, size.y, size.z);
  const scale = 1.7 / maxDim;
  model.scale.setScalar(scale);

  // recalcula box apos escala
  const box2 = new THREE.Box3().setFromObject(model);
  const size2 = new THREE.Vector3(); box2.getSize(size2);
  const center2 = new THREE.Vector3(); box2.getCenter(center2);
  model.position.sub(center2); // centra no (0,0,0)

  const box3 = new THREE.Box3().setFromObject(model);
  const finalSize = new THREE.Vector3(); box3.getSize(finalSize);
  const finalCenter = new THREE.Vector3(); box3.getCenter(finalCenter);

  // posiciona camera na frente, na altura do peito
  const chestY = box3.min.y + finalSize.y * 0.62;
  const camDist = finalSize.y * 1.35;
  camera.position.set(0, chestY + finalSize.y*0.05, camDist);
  controls.target.set(0, chestY, 0);
  camera.lookAt(0, chestY, 0);
  controls.update();

  resize();

  buildGarment(finalSize, finalCenter, box3);

  document.getElementById('loading').style.opacity = '0';
  setTimeout(()=> document.getElementById('loading').style.display='none', 500);

  animate();
}, undefined, (err) => {
  document.getElementById('loading').querySelector('p').textContent = 'erro ao carregar o modelo';
  console.error(err);
});

let decalMesh = null;
let bodyMeshes = [];

function buildGarment(finalSize, finalCenter, box3){
  // altura do peito (um pouco abaixo do ombro, onde uma estampa de camiseta fica)
  const chestY = box3.min.y + finalSize.y * 0.64;

  // mede a LARGURA REAL do corpo nessa altura disparando raios horizontais
  // contra a malha de verdade do manequim — assim a estampa sai do tamanho
  // certo pro corpo dele, em vez de um valor chutado.
  const farX = finalSize.x * 1.5;
  const rcRight = new THREE.Raycaster(
    new THREE.Vector3(finalCenter.x - farX, chestY, finalCenter.z),
    new THREE.Vector3(1, 0, 0)
  );
  const rcLeft = new THREE.Raycaster(
    new THREE.Vector3(finalCenter.x + farX, chestY, finalCenter.z),
    new THREE.Vector3(-1, 0, 0)
  );
  const hitsRight = rcRight.intersectObjects(bodyMeshes, true);
  const hitsLeft = rcLeft.intersectObjects(bodyMeshes, true);

  let bodyWidth = finalSize.x * 0.42; // fallback caso os raios nao acertem nada
  if (hitsRight.length && hitsLeft.length) {
    bodyWidth = Math.abs(hitsLeft[0].point.x - hitsRight[0].point.x);
  }

  // acha o ponto/normal de projecao vindo de frente (mesma tecnica da camera)
  const targetPoint = new THREE.Vector3(finalCenter.x, chestY, finalCenter.z);
  const rayDir = targetPoint.clone().sub(camera.position).normalize();
  const raycaster = new THREE.Raycaster(camera.position, rayDir);
  const hits = raycaster.intersectObjects(bodyMeshes, true);

  if (hits.length > 0) {
    buildDecal(hits[0].point, hits[0].face.normal, hits[0].object, bodyWidth);
  }
}

function buildDecal(point, faceNormalLocal, mesh, bodyWidth){
  if(decalMesh){ scene.remove(decalMesh); decalMesh.geometry.dispose(); decalMesh.material.dispose(); }

  // normal em espaco mundo
  const normalMatrix = new THREE.Matrix3().getNormalMatrix(mesh.matrixWorld);
  const worldNormal = faceNormalLocal.clone().applyMatrix3(normalMatrix).normalize();

  const dummy = new THREE.Object3D();
  dummy.position.copy(point);
  dummy.lookAt(point.clone().add(worldNormal));

  // estampa dimensionada pra largura REAL do corpo medida por raycast
  const decalWidth = bodyWidth * 0.82;
  const decalHeight = decalWidth * 1.25;
  const decalDepth = Math.max(bodyWidth * 0.5, 0.05);

  const geometry = new DecalGeometry(
    mesh,
    point,
    dummy.rotation,
    new THREE.Vector3(decalWidth, decalHeight, decalDepth)
  );

  const design = DESIGNS[currentDesignIndex];
  const colorway = design.colorways[currentColorwayIndex];
  const { tex } = makeTexture(design, colorway);

  const material = new THREE.MeshStandardMaterial({
    map: tex,
    transparent: true,
    depthTest: true,
    depthWrite: false,
    polygonOffset: true,
    polygonOffsetFactor: -4,
    roughness: 0.88,
    metalness: 0,
  });

  decalMesh = new THREE.Mesh(geometry, material);
  scene.add(decalMesh);
}

function updateDecalTexture(){
  if(!decalMesh) return;
  const design = DESIGNS[currentDesignIndex];
  const colorway = design.colorways[currentColorwayIndex];
  const { tex } = makeTexture(design, colorway);
  decalMesh.material.map = tex;
  decalMesh.material.needsUpdate = true;
}

function animate(){
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

/* ============================================================
   UI — lista de pecas / colorways / cta
   ============================================================ */
const wardrobeEl = document.getElementById('wardrobe');
const selNameEl = document.getElementById('sel-name');
const waBtn = document.getElementById('wa-btn');

function fmtPrice(v){ return 'R$ ' + v.toFixed(2).replace('.', ','); }

function renderWardrobe(){
  wardrobeEl.innerHTML = '';
  DESIGNS.forEach((design, di) => {
    const piece = document.createElement('div');
    piece.className = 'piece' + (di === currentDesignIndex ? ' active' : '');

    const top = document.createElement('div');
    top.className = 'piece-top';

    const swatchWrap = document.createElement('div');
    swatchWrap.className = 'piece-swatch';
    const swCanvas = document.createElement('canvas');
    swCanvas.width = 160; swCanvas.height = 160;
    const sctx = swCanvas.getContext('2d');
    const cw0 = design.colorways[di === currentDesignIndex ? currentColorwayIndex : 0];
    design.draw(sctx, 160, cw0.bg, cw0.ink, cw0.accent || '#ff4d1c');
    swatchWrap.appendChild(swCanvas);

    const info = document.createElement('div');
    info.className = 'piece-info';
    info.innerHTML = `
      <div class="piece-name">${design.name}</div>
      <div class="piece-tag">${design.tag}</div>
      <div class="piece-price">${fmtPrice(design.price)}</div>
    `;

    top.appendChild(swatchWrap);
    top.appendChild(info);
    piece.appendChild(top);

    const cwRow = document.createElement('div');
    cwRow.className = 'colorways';
    design.colorways.forEach((cw, ci) => {
      const dot = document.createElement('div');
      dot.className = 'cw' + (di === currentDesignIndex && ci === currentColorwayIndex ? ' selected' : '');
      dot.style.background = cw.bg;
      dot.title = cw.name;
      dot.addEventListener('click', (e) => {
        e.stopPropagation();
        currentDesignIndex = di;
        currentColorwayIndex = ci;
        updateDecalTexture();
        renderWardrobe();
        updateCTA();
      });
      cwRow.appendChild(dot);
    });
    piece.appendChild(cwRow);

    piece.addEventListener('click', () => {
      currentDesignIndex = di;
      currentColorwayIndex = 0;
      updateDecalTexture();
      renderWardrobe();
      updateCTA();
    });

    wardrobeEl.appendChild(piece);
  });
}

function updateCTA(){
  const design = DESIGNS[currentDesignIndex];
  const colorway = design.colorways[currentColorwayIndex];
  selNameEl.textContent = `${design.name} · ${colorway.name} · ${fmtPrice(design.price)}`;
  const msg = encodeURIComponent(`Oi! Vi a peça "${design.name}" (${colorway.name}) no provador 3D e quero saber mais.`);
  waBtn.href = `https://wa.me/?text=${msg}`;
}

renderWardrobe();
updateCTA();
</script>
